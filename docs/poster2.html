<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>签到码推送器（义父端）</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        :root {
            --primary: #2e7d32;
            --bg: #f0f2f5;
            --card: #fff;
            --text: #333;
            --muted: #999;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #000;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
            touch-action: manipulation;
        }

        .card {
            background: var(--card);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, .1);
            padding: 1.2rem;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: .3rem;
        }

        .subtitle {
            font-size: .85rem;
            color: var(--muted);
            margin-bottom: 1.2rem;
        }

        /* 状态指示 */
        .status-box {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-weight: bold;
            display: none;
            font-size: .9rem;
        }

        .status-idle {
            background: #e0e0e0;
            color: #555;
        }

        .status-loading {
            background: #fff3cd;
            color: #856404;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
        }

        /* 扫描区域 - 全屏相机 */
        #reader {
            width: 100%;
            aspect-ratio: 3/4;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
            margin-bottom: 10px;
            position: relative;
        }

        #reader video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
            border-radius: 8px;
        }

        #reader img[alt="Info icon"] {
            display: none;
        }

        /* 扫描框覆盖层 */
        .scan-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 10;
        }

        .scan-overlay::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70%;
            aspect-ratio: 1;
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 12px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.35);
        }

        .scan-line {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 68%;
            height: 2px;
            background: #4caf50;
            box-shadow: 0 0 8px rgba(76, 175, 80, 0.6);
            animation: scanMove 2s ease-in-out infinite;
        }

        @keyframes scanMove {

            0%,
            100% {
                transform: translate(-50%, calc(-50% - 35vw));
            }

            50% {
                transform: translate(-50%, calc(-50% + 35vw));
            }
        }

        .scan-hint {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.8);
            font-size: .8rem;
            background: rgba(0, 0, 0, 0.5);
            padding: 4px 12px;
            border-radius: 12px;
        }

        /* 控制按钮 */
        .cam-controls {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .cam-btn {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: .85rem;
            transition: background .2s;
        }

        .cam-btn:hover,
        .cam-btn:active {
            background: rgba(255, 255, 255, 0.3);
        }

        .cam-btn.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        /* 结果区域 */
        .result-container {
            margin-top: 10px;
            padding: 12px;
            background: #e8f5e9;
            border: 1px solid #c8e6c9;
            border-radius: 8px;
            display: none;
            word-break: break-all;
            text-align: left;
        }

        .result-label {
            font-weight: bold;
            color: #2e7d32;
            display: block;
            margin-bottom: 5px;
        }

        .result-text {
            color: #1b5e20;
            font-size: 1.1rem;
        }

        .result-link {
            display: inline-block;
            margin-top: 10px;
            padding: 6px 12px;
            background: #2e7d32;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            font-size: .9rem;
        }

        .db-status {
            margin-top: 8px;
            font-size: .85rem;
            color: #666;
        }

        /* 配置 */
        .config-panel {
            display: none;
            margin-top: 16px;
            padding: 14px;
            background: #f9f9f9;
            border-radius: 8px;
            text-align: left;
        }

        .config-panel.show {
            display: block;
        }

        .config-panel label {
            display: block;
            font-size: .75rem;
            color: #666;
            margin-top: 8px;
            margin-bottom: 2px;
        }

        .config-panel label:first-child {
            margin-top: 0;
        }

        .config-panel input {
            width: 100%;
            padding: 6px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: .85rem;
        }

        .config-panel input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .controls {
            margin-top: 16px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        button {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: .9rem;
            transition: background .2s;
        }

        button:hover {
            background: #1b5e20;
        }

        button.secondary {
            background: #e8e8e8;
            color: #333;
        }

        button.secondary:hover {
            background: #d5d5d5;
        }

        .save-btn {
            margin-top: 10px;
            width: 100%;
            background: var(--primary);
            color: #fff;
        }

        .footer {
            margin-top: 18px;
            color: #ddd;
            font-size: .7rem;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>📷 签到码推送器</h1>
        <div class="subtitle">扫描签到二维码，自动推送到接收端</div>

        <div id="status-box" class="status-idle">准备就绪</div>

        <div id="reader">
            <div class="scan-overlay">
                <div class="scan-line"></div>
            </div>
            <div class="scan-hint">将二维码放入框内，自动识别</div>
        </div>

        <div class="cam-controls">
            <button class="cam-btn" onclick="switchCamera()">🔄 切换摄像头</button>
            <button class="cam-btn" onclick="pickImage()">🖼 从相册选</button>
            <button class="cam-btn" onclick="toggleTorch()">🔦 闪光灯</button>
        </div>
        <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFileSelect(event)">

        <div class="result-container" id="result-container">
            <span class="result-label">最新扫描:</span>
            <div id="result-text"></div>
            <a id="result-link" href="#" target="_blank" class="result-link" style="display:none;">访问链接</a>
            <div class="db-status" id="db-status-detail"></div>
        </div>

        <div class="controls">
            <button class="secondary" onclick="toggleConfig()">⚙ 配置</button>
        </div>

        <div class="config-panel" id="config-panel">
            <label>API 地址</label>
            <input type="text" id="cfg-api" placeholder="https://tinywebdb.appinventor.space/api">
            <label>用户名</label>
            <input type="text" id="cfg-user" placeholder="infe1">
            <label>密钥</label>
            <input type="text" id="cfg-secret" placeholder="d1f614c8">
            <label>标签</label>
            <input type="text" id="cfg-tag" placeholder="infe_checkin_6688">
            <button class="save-btn" onclick="saveConfig()">保存</button>
        </div>

        <div class="footer">QRDeliver 协议 · 扫码后自动推送到 TinyWebDB</div>
    </div>

    <script>
        // ================= 配置 =================
        var DB_CONFIG = {
            baseUrl: "https://tinywebdb.appinventor.space/api",
            user: "infe1",
            secret: "d1f614c8",
            tag: "infe_checkin_6688"
        };

        var html5QrCode = null;
        var isSaving = false;
        var currentCameraId = null;
        var usingFrontCamera = false;
        var torchOn = false;
        var scanPaused = false;

        // DOM
        var statusBox = document.getElementById("status-box");
        var resultContainer = document.getElementById("result-container");
        var resultText = document.getElementById("result-text");
        var resultLink = document.getElementById("result-link");
        var dbStatusDetail = document.getElementById("db-status-detail");

        // ================= localStorage =================
        function loadSavedConfig() {
            try {
                var s = localStorage.getItem("qr_poster_cfg");
                if (!s) return;
                var c = JSON.parse(s);
                if (c.api) DB_CONFIG.baseUrl = c.api;
                if (c.user !== undefined) DB_CONFIG.user = c.user;
                if (c.secret !== undefined) DB_CONFIG.secret = c.secret;
                if (c.tag) DB_CONFIG.tag = c.tag;
            } catch (_) { }
        }

        function saveConfig() {
            DB_CONFIG.baseUrl = document.getElementById("cfg-api").value.trim() || DB_CONFIG.baseUrl;
            DB_CONFIG.user = document.getElementById("cfg-user").value.trim();
            DB_CONFIG.secret = document.getElementById("cfg-secret").value.trim();
            DB_CONFIG.tag = document.getElementById("cfg-tag").value.trim() || "infe_checkin_6688";
            localStorage.setItem("qr_poster_cfg", JSON.stringify({
                api: DB_CONFIG.baseUrl, user: DB_CONFIG.user,
                secret: DB_CONFIG.secret, tag: DB_CONFIG.tag
            }));
            document.getElementById("config-panel").classList.remove("show");
            updateStatus("idle", "配置已保存");
        }

        function toggleConfig() {
            var p = document.getElementById("config-panel");
            p.classList.toggle("show");
            if (p.classList.contains("show")) {
                document.getElementById("cfg-api").value = DB_CONFIG.baseUrl;
                document.getElementById("cfg-user").value = DB_CONFIG.user;
                document.getElementById("cfg-secret").value = DB_CONFIG.secret;
                document.getElementById("cfg-tag").value = DB_CONFIG.tag;
            }
        }

        // ================= URL 参数覆盖 =================
        function loadFromUrl() {
            var p = new URLSearchParams(location.search);
            if (p.has("api")) DB_CONFIG.baseUrl = p.get("api");
            if (p.has("user")) DB_CONFIG.user = p.get("user");
            if (p.has("secret")) DB_CONFIG.secret = p.get("secret");
            if (p.has("tag")) DB_CONFIG.tag = p.get("tag");
        }

        // ================= 状态管理 =================
        function updateStatus(type, message) {
            statusBox.style.display = "block";
            statusBox.className = "status-box status-" + type;
            statusBox.innerText = message;
        }

        // ================= 核心：推送到 TinyWebDB =================
        async function saveToTinyWebDB(value) {
            if (isSaving) return;
            isSaving = true;
            scanPaused = true;
            updateStatus("loading", "正在推送到服务器...");
            dbStatusDetail.innerText = "";

            var formData = new FormData();
            formData.append("user", DB_CONFIG.user);
            formData.append("secret", DB_CONFIG.secret);
            formData.append("action", "update");
            formData.append("tag", DB_CONFIG.tag);
            formData.append("value", value);

            try {
                var response = await fetch(DB_CONFIG.baseUrl, { method: "POST", body: formData });
                if (response.ok) {
                    updateStatus("success", "推送成功!");
                    dbStatusDetail.innerText = "已同步至接收端";
                    // 震动反馈
                    if (navigator.vibrate) navigator.vibrate(200);
                } else {
                    throw new Error("HTTP " + response.status);
                }
            } catch (error) {
                updateStatus("error", "推送失败: " + error.message);
            }
            setTimeout(function () {
                isSaving = false;
                scanPaused = false;
                if (statusBox.classList.contains("status-success"))
                    updateStatus("idle", "等待下一次扫描...");
            }, 2000);
        }

        // ================= 扫码回调 =================
        function onScanSuccess(decodedText) {
            if (scanPaused) return;
            resultContainer.style.display = "block";
            resultText.innerText = decodedText;
            try { new URL(decodedText); resultLink.href = decodedText; resultLink.style.display = "inline-block"; }
            catch (_) { resultLink.style.display = "none"; }
            saveToTinyWebDB(decodedText);
        }

        // ================= 相机控制 =================
        async function switchCamera() {
            usingFrontCamera = !usingFrontCamera;
            torchOn = false;
            await startCamera();
        }

        async function toggleTorch() {
            if (!html5QrCode) return;
            try {
                var track = html5QrCode.getRunningTrackSettings ? null : null;
                // 通过底层 stream 获取 track
                var videoEl = document.querySelector("#reader video");
                if (videoEl && videoEl.srcObject) {
                    var tracks = videoEl.srcObject.getVideoTracks();
                    if (tracks.length > 0) {
                        var capabilities = tracks[0].getCapabilities();
                        if (capabilities.torch) {
                            torchOn = !torchOn;
                            await tracks[0].applyConstraints({ advanced: [{ torch: torchOn }] });
                            updateStatus("idle", torchOn ? "闪光灯已开启" : "闪光灯已关闭");
                        } else {
                            updateStatus("error", "当前摄像头不支持闪光灯");
                        }
                    }
                }
            } catch (e) {
                updateStatus("error", "闪光灯控制失败: " + e.message);
            }
        }

        function pickImage() {
            document.getElementById("file-input").click();
        }

        async function handleFileSelect(event) {
            var file = event.target.files[0];
            if (!file) return;
            updateStatus("loading", "正在识别图片...");
            try {
                var tempScanner = new Html5Qrcode("reader-temp");
                var result = await tempScanner.scanFile(file, true);
                onScanSuccess(result);
            } catch (e) {
                updateStatus("error", "未识别到二维码");
            }
            event.target.value = "";
        }

        async function startCamera() {
            // 停止现有摄像头
            if (html5QrCode) {
                try { await html5QrCode.stop(); } catch (_) { }
            }

            html5QrCode = new Html5Qrcode("reader");

            // 获取摄像头列表，优先选后置
            try {
                var devices = await Html5Qrcode.getCameras();
                if (devices && devices.length > 0) {
                    // 尝试找后置摄像头
                    var target = null;
                    for (var i = 0; i < devices.length; i++) {
                        var label = (devices[i].label || "").toLowerCase();
                        if (!usingFrontCamera && (label.includes("back") || label.includes("rear") || label.includes("后") || label.includes("environment"))) {
                            target = devices[i];
                            break;
                        }
                        if (usingFrontCamera && (label.includes("front") || label.includes("前") || label.includes("user"))) {
                            target = devices[i];
                            break;
                        }
                    }
                    // 如果没找到指定方向，用第一个（后置）或最后一个（前置）
                    if (!target) {
                        target = usingFrontCamera ? devices[devices.length - 1] : devices[0];
                    }
                    currentCameraId = target.id;
                }
            } catch (e) {
                console.warn("获取摄像头列表失败:", e);
            }

            var config = {
                fps: 15,
                qrbox: function (viewfinderWidth, viewfinderHeight) {
                    var minDim = Math.min(viewfinderWidth, viewfinderHeight);
                    var size = Math.floor(minDim * 0.7);
                    return { width: size, height: size };
                },
                aspectRatio: 3 / 4,
                disableFlip: false,
                experimentalFeatures: { useBarCodeDetectorIfSupported: true }
            };

            // 使用具体摄像头 ID 或 facingMode
            var cameraConfig = currentCameraId
                ? currentCameraId
                : { facingMode: usingFrontCamera ? "user" : "environment" };

            try {
                await html5QrCode.start(
                    cameraConfig,
                    config,
                    onScanSuccess,
                    function () { } // 忽略扫描失败
                );

                // 尝试启用连续自动对焦
                try {
                    var videoEl = document.querySelector("#reader video");
                    if (videoEl && videoEl.srcObject) {
                        var tracks = videoEl.srcObject.getVideoTracks();
                        if (tracks.length > 0) {
                            await tracks[0].applyConstraints({
                                advanced: [{ focusMode: "continuous" }]
                            });
                        }
                    }
                } catch (e) {
                    console.warn("连续对焦设置失败:", e);
                }

                updateStatus("idle", "摄像头已启动，请对准二维码");
            } catch (e) {
                updateStatus("error", "摄像头启动失败: " + e.message);
            }
        }

        // ================= 启动 =================
        window.addEventListener("load", function () {
            loadFromUrl();
            loadSavedConfig();

            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                updateStatus("error", "浏览器不支持摄像头（需要 HTTPS）");
                return;
            }

            // 创建隐藏的临时 div 用于图片识别
            var tempDiv = document.createElement("div");
            tempDiv.id = "reader-temp";
            tempDiv.style.display = "none";
            document.body.appendChild(tempDiv);

            startCamera();
        });
    </script>
</body>

</html>
